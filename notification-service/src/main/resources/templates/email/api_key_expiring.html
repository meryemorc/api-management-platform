<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 8px; padding: 40px; }
        .header { background-color: #8b5cf6; padding: 20px; border-radius: 8px 8px 0 0; text-align: center; }
        .header h1 { color: white; margin: 0; font-size: 22px; }
        .content { padding: 30px 0; }
        .stat-box { background: #ede9fe; border-left: 4px solid #8b5cf6; padding: 15px; margin: 20px 0; border-radius: 4px; }
        .footer { text-align: center; color: #9ca3af; font-size: 12px; margin-top: 30px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔑 API Key Expiring Soon</h1>
    </div>
    <div class="content">
        <p>Hello <strong th:text="${recipientName}">User</strong>,</p>
        <p>Your API key is expiring in <strong th:text="${daysUntilExpiry}">7</strong> days.</p>
        <div class="stat-box">
            <p>🔑 <strong>Key Name:</strong> <span th:text="${keyName}">my-key</span></p>
            <p>📅 <strong>Expires:</strong> <span th:text="${expiryDate}">2026-01-01</span></p>
        </div>
        <p>Please renew your API key before it expires to avoid service interruption.</p>
    </div>
    <div class="footer">
        <p>API Management Platform · You are receiving this because you enabled API key alerts.</p>
    </div>
</div>
</body>
</html>
