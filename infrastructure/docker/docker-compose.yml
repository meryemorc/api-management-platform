version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: api-management-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: api_management_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: api-management-redis
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:6.0
    container_name: api-management-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: analytics_db

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: api-management-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: api-management-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1